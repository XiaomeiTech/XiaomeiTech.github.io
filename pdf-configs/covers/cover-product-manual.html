<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
    color: #222;
  }
  .cover {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    text-align: center;
    padding: 80px 60px 60px 60px;
  }
  .cover-logo {
    font-size: 22px;
    font-weight: 700;
    color: #dc2626;
    letter-spacing: 8px;
  }
  .cover-series {
    font-size: 17px;
    font-weight: 700;
    color: #333;
    margin-top: 100px;
  }
  .cover-title {
    font-size: 40px;
    font-weight: 700;
    color: #dc2626;
    margin-top: 24px;
    letter-spacing: 6px;
  }
  .cover-subtitle {
    font-size: 15px;
    color: #888;
    margin-top: 8px;
    letter-spacing: 3px;
  }
  .cover-divider {
    width: 60px;
    height: 3px;
    background: #dc2626;
    margin: 44px auto;
  }
  .cover-desc {
    font-size: 14px;
    color: #555;
    line-height: 2.2;
  }
  .cover-bottom {
    font-size: 12px;
    color: #999;
    line-height: 2;
  }
</style>
</head>
<body>
<div class="cover">
  <div></div>
  <div>
    <div class="cover-logo">小美技术</div>
    <div class="cover-series">飞达控制器</div>
    <div class="cover-title">单品手册</div>
    <div class="cover-subtitle">PRODUCT MANUAL</div>
    <div class="cover-divider"></div>
    <div class="cover-desc">
      CM-SC1524-N · 5轴脉冲控制卡<br>
      硬件连接 · 参数设置 · 手动/自动控制 · 故障排查
    </div>
  </div>
  <div class="cover-bottom">
    小美技术（东莞）有限公司<br>
    Xiaomei Technology (Dongguan) Co., Ltd.
  </div>
</div>
</body>
</html>
