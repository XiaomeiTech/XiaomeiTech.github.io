name: Rebuild Docs

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'markdown/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/rebuild.yml'

jobs:
  rebuild:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Rebuild
        run: npm run rebuild
