name: Build Markdown PDF

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - 'markdown/**/*.md'
      - 'pdf-configs/**'
      - 'pdf-templates/**'
      - 'pdf-content/**'
      - 'scripts/generate_pdf.py'
      - 'requirements.txt'
      - '.github/workflows/markdown-pdf.yml'

jobs:
  markdown-to-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf2.0-0 libffi8

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate PDFs
        run: |
          mkdir -p artifacts/pdf
          for cfg in pdf-configs/*.yaml; do
            echo "=== $(basename "$cfg") ==="
            python scripts/generate_pdf.py -c "$cfg" -v
          done

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: markdown-pdf
          path: artifacts/pdf
          if-no-files-found: warn

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-pdf
          name: Latest PDF Exports
          files: artifacts/pdf/*.pdf
          make_latest: true
