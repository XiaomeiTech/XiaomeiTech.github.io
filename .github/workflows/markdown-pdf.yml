name: Build Markdown PDF

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - 'markdown/**/*.md'
      - '.github/workflows/markdown-pdf.yml'

jobs:
  markdown-to-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Puppeteer deps
        run: sudo apt-get update && sudo apt-get install -y libnss3 libnspr4 libgbm1 libasound2

      - name: Build docs
        run: npm run docs:build

      - name: Export PDF
        run: npm run docs:pdf

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: markdown-pdf
          path: artifacts/pdf
          if-no-files-found: warn

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-pdf
          name: Latest PDF Exports
          files: artifacts/pdf/*.pdf
          make_latest: true