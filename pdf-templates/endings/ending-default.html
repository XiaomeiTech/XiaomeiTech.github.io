<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: {{ FONT }};
    color: #555;
  }
  @page { size: A4; margin: 0; }
  .ending {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: 60px 80px;
  }
  .ending-divider {
    width: 80px;
    height: 3px;
    background: {{ BRAND }};
    margin-bottom: 40px;
  }
  .ending-title {
    font-size: 28px;
    font-weight: 700;
    color: {{ BRAND }};
    margin-bottom: 24px;
  }
  .ending-text {
    font-size: 14px;
    line-height: 2;
    color: #666;
    margin-bottom: 40px;
  }
  .ending-contact {
    font-size: 13px;
    line-height: 2;
    color: #888;
  }
  .ending-bottom {
    position: absolute;
    bottom: 60px;
    left: 80px;
    right: 80px;
    font-size: 11px;
    color: #aaa;
    line-height: 2;
  }
  .ending-bottom .company {
    font-size: 14px;
    font-weight: 700;
    color: {{ BRAND }};
  }
</style>
</head>
<body>
<div class="ending">
  <div class="ending-divider"></div>
  <div class="ending-title">{{ TITLE }}</div>
  <div class="ending-text">
    本文档由 {{ COMPANY }} 编制，仅供客户参考使用。<br>
    本公司保留随时更改产品规格及文档内容的权利，恕不另行通知。<br>
    如需获取最新版本的技术文档或咨询技术问题，请联系我们。
  </div>
  <div class="ending-contact">
    官网：https://xiaomeitech.com<br>
    最新文档下载：https://github.com/XiaomeiTech/XiaomeiTech.github.io/releases
  </div>
  <div class="ending-bottom">
    <div class="company">{{ COMPANY }}</div>
    {{ COMPANY_EN }}<br>
    文档发布于 {{ YEAR }} 年 {{ MONTH }} 月
  </div>
</div>
</body>
</html>
